<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bookroom</title>
    <link rel="stylesheet" href="CSS/login.css">
</head>
<body>

    <div class="login-card">
        <h1>Bookroom</h1>
        <p>Selamat Datang</p>
        
        <input type="text" id="username" placeholder="Nama Anda..." onkeypress="handleEnter(event)">
        <input type="text" id="alamat" placeholder="Alamat Anda..." onkeypress="handleEnter(event)">
        <input type="text" id="umur" placeholder="Umur Anda..." onkeypress="handleEnter(event)">
        <button onclick="login()">MASUK</button>
    </div>
 
    <script src="JS/login.js"></script>

</body>
</html>
